spring:
  application:
    name: log-analyzer

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: log-analyzer
    description: Enterprise log ingestion and analysis platform
    version: '@project.version@'
    java-version: '@java.version@'
