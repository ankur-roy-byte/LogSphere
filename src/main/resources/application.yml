spring:
  application:
    name: log-analyzer

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  jackson:
    default-property-inclusion: non_null

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: log-analyzer
    description: Enterprise log ingestion and analysis platform
    version: '@project.version@'
    java-version: '@java.version@'

app:
  kafka:
    enabled: false
    bootstrap-servers: localhost:9092
    consumer:
      group-id: logsphere-consumer-group
      auto-offset-reset: earliest
      concurrency: 3
    topic:
      logs: logs
  cache:
    ttl-minutes: 5
    max-size: 10000
    redis-host: localhost
    redis-port: 6379
  parsing:
    chunk-size-kb: 500
    max-concurrent-parsers: 16
  thread-pool:
    ingestion:
      core-size: 4
      max-size: 8
      queue-capacity: 500
    parsing:
      core-size: 8
      max-size: 16
      queue-capacity: 1000
    analysis:
      core-size: 8
      max-size: 16
      queue-capacity: 500
    persistence:
      core-size: 2
      max-size: 4
      queue-capacity: 200
  analytics:
    z-score-threshold: 3
    window-size-minutes: 10
    anomaly-percentile: 0.95
    enable-pattern-clustering: true
  retention:
    enabled: true
    parsed-log-retention-days: 30
    raw-log-retention-days: 7
    analysis-result-retention-days: 90
  notification:
    email-enabled: false
    email-from: alerts@logsphere.io
    email-to: []
    email-subject-prefix: "[LogSphere Alert]"
    slack-enabled: false
    slack-webhook-url: ""

cache:
  ttl:
    alert-rules: 30
    search-results: 5
    log-entries: 10
    analysis-results: 15
    sessions: 120
    audit-logs: 60

kafka:
  enabled: false
  bootstrap-servers: localhost:9092
  consumer:
    group-id: logsphere-consumer-group
    auto-offset-reset: earliest
    concurrency: 3
  topic:
    logs: logs

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true

logging:
  level:
    root: INFO
    com.ankur.loganalyzer: INFO
    org.springframework.web: INFO
  file:
    name: logs/logsphere.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
