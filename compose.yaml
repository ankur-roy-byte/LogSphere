services:
  postgres:
    image: 'postgres:17-alpine'
    container_name: loganalyzer-postgres
    environment:
      POSTGRES_DB: loganalyzer
      POSTGRES_USER: loganalyzer
      POSTGRES_PASSWORD: loganalyzer
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U loganalyzer -d loganalyzer']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loganalyzer-network

  redis:
    image: 'redis:7-alpine'
    container_name: loganalyzer-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loganalyzer-network

  zookeeper:
    image: 'confluentinc/cp-zookeeper:7.5.0'
    container_name: loganalyzer-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - '2181:2181'
    healthcheck:
      test: ['CMD-SHELL', 'echo ruok | nc localhost 2181 | grep imok']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - loganalyzer-network

  kafka:
    image: 'confluentinc/cp-kafka:7.5.0'
    container_name: loganalyzer-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - '9092:9092'
    healthcheck:
      test: ['CMD-SHELL', 'kafka-broker-api-versions --bootstrap-server localhost:9092']
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - loganalyzer-network

volumes:
  postgres-data:

networks:
  loganalyzer-network:
    driver: bridge
